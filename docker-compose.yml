version: '3.8'
services:
  sijahub-web:
    image: nginx:alpine
    container_name: sijahub-frontend
    ports:
      - "8443:80"  # Port kesepakatan kelompok 7
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - sijahub-backend

  sijahub-backend:
    build: ./sija_connect
    container_name: sijahub-api
    restart: always
    environment:
      - MONGO_URI=mongodb+srv://violashafa:viola123@cluster0.lyvx0c2.mongodb.net/sijahub_db?retryWrites=true&w=majority
      - PORT=5000
    depends_on:
      - mongo-db

  mongo-db:
    image: mongo:latest
    container_name: sijahub-mongodb
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: