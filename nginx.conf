server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html/pages;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # CSS, JS, Assets - Arahkan ke root utama /usr/share/nginx/html
    location /css/ { root /usr/share/nginx/html; }
    location /js/ { root /usr/share/nginx/html; }
    location /assets/ { root /usr/share/nginx/html; }
    location /components/ { root /usr/share/nginx/html; }

    # KONEKSI KE BACKEND
    location /api/ {
        # Nama 'sijahub-api' harus sama dengan container_name di compose
        proxy_pass http://sijahub-api:5000/; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}