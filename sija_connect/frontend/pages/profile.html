<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Edit Profil - SijaHub</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/header.css">
    <style>
        .profile-container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .avatar-upload { text-align: center; margin-bottom: 25px; position: relative; }
        .avatar-preview { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #17a2b8; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        .btn-save { width: 100%; padding: 15px; background: #17a2b8; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { background: #138496; transform: translateY(-2px); }
        .password-section { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #eee; }
    </style>
</head>
<body>
    <div id="header"></div>

    <div class="profile-container">
        <h2 style="text-align: center; color: #17a2b8;">Pengaturan Profil</h2>
        
        <form id="profileForm">
            <div class="avatar-upload">
                <img src="../assets/default-avatar.png" id="imgPreview" class="avatar-preview">
                <input type="file" id="inputAvatar" accept="image/*" style="display: none;">
                <br>
                <button type="button" onclick="document.getElementById('inputAvatar').click()" style="margin-top: 10px; cursor: pointer; border: none; background: none; color: #17a2b8; font-weight: bold;">Ganti Foto Profil</button>
            </div>

            <div class="form-group">
                <label>Nama Depan</label>
                <input type="text" id="firstname" required>
            </div>
            <div class="form-group">
                <label>Nama Belakang</label>
                <input type="text" id="lastname">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="password-section">
                <h3 style="font-size: 16px; color: #666; margin-bottom: 15px;">Ganti Password (Opsional)</h3>
                <div class="form-group">
                    <label>Password Lama</label>
                    <input type="password" id="oldPassword" placeholder="Masukkan password saat ini">
                </div>
                <div class="form-group">
                    <label>Password Baru</label>
                    <input type="password" id="newPassword" placeholder="Masukkan password baru">
                </div>
            </div>

            <button type="submit" class="btn-save">Simpan Perubahan</button>
        </form>
    </div>

    <script src="../js/header.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        // 1. Load Data Profil Saat Halaman Dibuka
        async function loadProfile() {
            try {
                const res = await fetch('/api/auth/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const json = await res.json();
                if (json.success) {
                    document.getElementById('firstname').value = json.data.firstname;
                    document.getElementById('lastname').value = json.data.lastname || '';
                    document.getElementById('email').value = json.data.email;
                    // Jika ada avatar di DB, tampilkan. Jika tidak, pakai default.
                    if (json.data.avatar) {
                        document.getElementById('imgPreview').src = json.data.avatar;
                    }
                }
            } catch (err) {
                console.error("Gagal load profil:", err);
            }
        }

        // 2. Preview Foto Sebelum Upload
        document.getElementById('inputAvatar').onchange = evt => {
            const [file] = document.getElementById('inputAvatar').files;
            if (file) {
                document.getElementById('imgPreview').src = URL.createObjectURL(file);
            }
        };

        // 3. Proses Simpan Perubahan
        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('firstname', document.getElementById('firstname').value);
            formData.append('lastname', document.getElementById('lastname').value);
            formData.append('email', document.getElementById('email').value);
            
            // Ambil data password
            const oldPass = document.getElementById('oldPassword').value;
            const newPass = document.getElementById('newPassword').value;
            
            if (newPass !== "") {
                formData.append('oldPassword', oldPass);
                formData.append('newPassword', newPass);
            }

            // Ambil file foto jika ada
            const fileInput = document.getElementById('inputAvatar');
            if (fileInput.files[0]) {
                formData.append('avatar', fileInput.files[0]);
            }

            try {
                const res = await fetch('/api/auth/update-profile', {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData // Pakai FormData karena ada upload file
                });

                const result = await res.json();
                
                if (result.success) {
                    alert('Profil berhasil diperbarui!');
                    
                    // UPDATE LOCALSTORAGE agar navbar langsung berubah
                    localStorage.setItem('userName', result.user.firstname);
                    if (result.user.avatar) {
                        localStorage.setItem('userAvatar', result.user.avatar);
                    }
                    
                    location.reload(); // Refresh halaman
                } else {
                    alert("Gagal: " + result.message);
                }
            } catch (err) {
                alert("Terjadi kesalahan server");
            }
        };

        // 4. Load Header
        fetch('../components/header.html')
            .then(r => r.text())
            .then(d => {
                document.getElementById('header').innerHTML = d;
                if (typeof updateNavbarByRole === "function") {
                    updateNavbarByRole();
                }
            });

        loadProfile();
    </script>
</body>
</html>
