<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SijaHub - Prestasi Siswa</title>
    
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    
    <style>
        /* CSS Utama */
        .container { max-width: 1200px; margin: auto; padding: 40px 20px; min-height: 80vh; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        .page-title { font-size: 40px; margin: 0; }
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--white); padding: 25px; border-radius: 20px; text-align: center; box-shadow: var(--shadow); border-bottom: 4px solid transparent; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); border-bottom: 4px solid var(--primary); }
        .stat-value { font-size: 36px; font-weight: 800; color: var(--primary); display: block; }
        .stat-label { font-size: 13px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-top: 5px; display: block; }
        .filter-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; background: var(--white); padding: 15px; border-radius: 15px; box-shadow: var(--shadow); }
        .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .tab { padding: 8px 20px; border-radius: 20px; border: 1px solid #ddd; background: transparent; color: var(--text-muted); cursor: pointer; font-weight: 600; transition: 0.3s; white-space: nowrap; }
        .tab.active { background: var(--primary); color: var(--white); border-color: var(--primary); }
        .search-box { padding: 10px 15px; border-radius: 10px; border: 1px solid #ddd; width: 250px; outline: none; }
        .search-box:focus { border-color: var(--primary); }
        
        /* Grid Kartu */
        #achievementList { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .card { background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; border: 1px solid #eee; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .card-body { padding: 25px; }
        .tag { background: rgba(10, 163, 181, 0.1); color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        
        /* Popup */
        .popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .popup-content { background: var(--white); width: 95%; max-width: 950px; border-radius: 25px; position: relative; animation: slideUp 0.3s ease; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); max-height: 90vh; overflow-y: auto; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 28px; cursor: pointer; color: var(--primary); background: var(--white); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; z-index: 10; box-shadow: var(--shadow); }
        
        /* Image Wrapper Detail */
        .p-img-wrapper { flex: 1.1; min-width: 300px; background: #ffffff; display: flex; align-items: center; justify-content: center; padding: 25px; border-right: 1px solid #f0f0f0; }
        #pImg { max-width: 100%; max-height: 520px; width: auto; height: auto; object-fit: contain; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }

        .form-input { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; font-family: inherit; }
        @media (max-width: 768px) { .stats-bar { grid-template-columns: 1fr; } .filter-row { flex-direction: column; align-items: stretch; } .search-box { width: 100%; } .p-img-wrapper { border-right: none; border-bottom: 1px solid #f0f0f0; } }

        /* --- STYLE BARU: NOTIFIKASI TOAST --- */
        .toast {
            position: fixed; top: 20px; right: 20px; background: #10b981; color: white; 
            padding: 15px 25px; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            display: flex; align-items: center; gap: 10px; z-index: 9999;
            transform: translateX(150%); transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-weight: 600;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { background: #ef4444; }
    </style>
</head>
<body>

    <div id="header"></div>

    <div id="toast" class="toast">
        <span id="toastIcon">✅</span>
        <span id="toastMsg">Berhasil!</span>
    </div>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Prestasi Siswa SIJA</h1>
            <button class="btn-primary" onclick="openForm()">+ Tambah Prestasi</button>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <span class="stat-value" id="sTotal">0</span>
                <span class="stat-label">Total Prestasi</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="sNasional">0</span>
                <span class="stat-label">Tingkat Nasional</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="sInternasional">0</span>
                <span class="stat-label">Tingkat Internasional</span>
            </div>
        </div>

        <div class="filter-row">
            <div class="tabs" id="categoryTabs">
                <button class="tab active" onclick="setFilter('All', this)">Semua</button>
                <button class="tab" onclick="setFilter('Backend', this)">Backend</button>
                <button class="tab" onclick="setFilter('Frontend', this)">Frontend</button>
                <button class="tab" onclick="setFilter('Cyber Security', this)">Cyber</button>
                <button class="tab" onclick="setFilter('LKS', this)">LKS</button>
            </div>
            <input type="text" id="search" class="search-box" placeholder="🔍 Cari nama atau lomba..." oninput="currentPage=1; render()">
        </div>

        <div id="achievementList"></div>
        
        <div id="pagination" style="display:flex; justify-content:center; gap:8px; margin-top:40px; margin-bottom: 40px;"></div>

        <div id="detailPopup" class="popup">
            <div class="popup-content" style="display: flex; flex-wrap: wrap;">
                <span class="close-btn" onclick="closePopup('detailPopup')">&times;</span>
                <div class="p-img-wrapper">
                    <img id="pImg" alt="Dokumentasi Prestasi">
                </div>
                <div style="flex: 1; min-width: 300px; padding: 40px; display: flex; flex-direction: column; background: #fff;">
                    <div style="margin-bottom: auto;">
                        <span id="pTingkatBadge" class="tag" style="font-size: 12px; padding: 6px 14px;"></span>
                        <h2 id="pTitle" style="margin: 15px 0 10px; font-size: 32px; color: #333;"></h2>
                        <p id="pPemenang" style="font-weight: 700; font-size: 18px; margin-bottom: 5px; display:flex; align-items:center; gap:8px; color: #444;">
                            🏆 <span id="pPemenangText"></span>
                        </p>
                        <p id="pDateDisplay" style="font-size: 14px; color: #888; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
                            📅 <span id="pDateText"></span>
                        </p>
                        <p id="pFull" style="color: #666; line-height: 1.8; font-size: 15px;"></p>
                    </div>
                    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; display: flex; gap: 12px;">
                        <button onclick="handleEdit()" style="flex:1; padding:12px; border-radius:12px; border:none; background:#f1f5f9; color:#475569; font-weight:600; cursor:pointer;">Edit Data</button>
                        <button onclick="handleDelete()" style="flex:1; padding:12px; border-radius:12px; border:none; background:#fff1f1; color:#ef4444; font-weight:600; cursor:pointer;">Hapus</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="formPopup" class="popup">
            <div class="popup-content" style="max-width:550px; padding:35px;">
                <span class="close-btn" onclick="closePopup('formPopup')">&times;</span>
                <h2 id="fHeader" style="margin: 0 0 24px; font-size: 26px; text-align: center;">Form Data Prestasi</h2>
                <form id="aForm" style="display:flex; flex-direction:column; gap:16px;">
                    <input type="hidden" id="fId">
                    <div>
                        <label style="font-size:12px; font-weight:bold; color:var(--text-muted);">Judul Lomba/Prestasi</label>
                        <input type="text" id="fTitle" required class="form-input">
                    </div>
                    <div>
                        <label style="font-size:12px; font-weight:bold; color:var(--text-muted);">Nama Pemenang</label>
                        <input type="text" id="fPemenang" required class="form-input">
                    </div>
                    <div>
                        <label style="font-size:12px; font-weight:bold; color:var(--text-muted);">Deskripsi Lengkap</label>
                        <textarea id="fFull" rows="4" class="form-input" style="resize: none;"></textarea>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <div>
                            <label style="font-size:12px; font-weight:bold; color:var(--text-muted);">Tingkat</label>
                            <select id="fTingkat" class="form-input">
                                <option value="Kota">Kota</option>
                                <option value="Provinsi">Provinsi</option>
                                <option value="Nasional">Nasional</option>
                                <option value="Internasional">Internasional</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size:12px; font-weight:bold; color:var(--text-muted);">Kategori</label>
                            <select id="fCat" class="form-input" onchange="toggleCustomCat()">
                                <option value="Backend">Backend</option>
                                <option value="Frontend">Frontend</option>
                                <option value="Cyber Security">Cyber</option>
                                <option value="LKS">LKS</option>
                                <option value="Lainnya">-- Lainnya (Ketik) --</option>
                            </select>
                            <input type="text" id="fCatCustom" class="form-input" placeholder="Ketik kategori..." style="display:none; margin-top:8px;">
                        </div>
                    </div>
                    <div>
                        <label style="font-size:12px; font-weight:bold; color:var(--text-muted);">Tanggal Prestasi</label>
                        <input type="date" id="fDate" required class="form-input">
                    </div>
                    <div>
                        <label style="font-size:12px; font-weight:bold; color:var(--text-muted);">Gambar Dokumentasi</label>
                        <input type="file" id="fImg" accept="image/*" class="form-input" style="padding:8px;" onchange="previewImage(event)">
                        <img id="imgPreview" style="display:none; width:100%; max-height:150px; object-fit:cover; border-radius:10px; margin-top:10px; border:1px solid #ddd;">
                    </div>
                    <button type="submit" id="btnSubmit" class="btn-primary" style="margin-top: 10px; width: 100%;">Simpan Data</button>
                </form>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="../js/header.js"></script>
    <script>
        let rawData = [], currentCat = 'All', currentPage = 1;
        const limit = 6;
        const API_BASE = 'https://localhost:5000';
        const API = `${API_BASE}/api/achievements`;

        const getAuthHeaders = () => {
            const token = localStorage.getItem("token");
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        };

        // --- FUNGSI TAMPIL ALERT ---
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = message;
            document.getElementById('toastIcon').innerText = type === 'success' ? '✅' : '❌';
            toast.className = `toast ${type === 'error' ? 'error' : ''} show`;
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function previewImage(event) {
            const preview = document.getElementById('imgPreview');
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        async function initializeApp() {
            const role = localStorage.getItem("userRole");
            if (role !== 'admin') {
                alert("Akses Ditolak! Anda harus login sebagai Admin.");
                window.location.href = "login.html"; 
                return;
            }
            try {
                const [hRes, fRes] = await Promise.all([
                    fetch('../components/header.html'),
                    fetch('../components/footer.html')
                ]);
                if(hRes.ok) document.getElementById('header').innerHTML = await hRes.text();
                if(fRes.ok) document.getElementById('footer').innerHTML = await fRes.text();
                await loadAchievements();
            } catch (err) { console.error("Gagal inisialisasi:", err); }
        }

        async function loadAchievements() {
            try {
                const res = await fetch(API);
                const json = await res.json();
                rawData = json.data || [];
                updateStats();
                render();
            } catch (e) { console.error("Gagal load data:", e); }
        }

        function updateStats() {
            document.getElementById('sTotal').innerText = rawData.length;
            document.getElementById('sNasional').innerText = rawData.filter(d => d.tingkat === 'Nasional').length;
            document.getElementById('sInternasional').innerText = rawData.filter(d => d.tingkat === 'Internasional').length;
        }

        function setFilter(cat, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentCat = cat; currentPage = 1; render();
        }

        function render() {
            const search = document.getElementById('search').value.toLowerCase();
            const filtered = rawData.filter(d => {
                const matchSearch = d.title.toLowerCase().includes(search) || 
                                   (d.pemenang && d.pemenang.toLowerCase().includes(search));
                const matchCat = currentCat === 'All' || d.kategoriLomba === currentCat;
                return matchSearch && matchCat;
            });
            const list = document.getElementById('achievementList');
            const startIndex = (currentPage - 1) * limit;
            const items = filtered.slice(startIndex, startIndex + limit);

            if(items.length === 0) {
                list.innerHTML = `<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">Belum ada data prestasi.</p>`;
            } else {
                list.innerHTML = items.map(d => `
                    <div class="card" onclick="showDetail('${d._id}')">
                        <img src="${d.image ? d.image : '../img/default.png'}" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
                        <div class="card-body">
                            <span class="tag">${d.kategoriLomba}</span>
                            <h3 style="margin: 10px 0;">${d.title}</h3>
                            <p>🏆 ${d.pemenang || 'Siswa SIJA'}</p>
                        </div>
                    </div>
                `).join('');
            }
            renderPagination(filtered.length);
        }

        function renderPagination(totalItems) {
            const pg = document.getElementById('pagination');
            const totalPage = Math.ceil(totalItems / limit) || 1;
            pg.innerHTML = '';
            if(totalPage > 1) {
                for(let i=1; i<=totalPage; i++) {
                    const activeStyle = i === currentPage ? 'background:var(--primary); color:white;' : 'background:white; color:var(--primary); border:1px solid var(--primary);';
                    pg.innerHTML += `<button onclick="changePage(${i})" style="padding:8px 16px; border-radius:10px; cursor:pointer; font-weight:600; ${activeStyle}">${i}</button>`;
                }
            }
        }

        function changePage(page) { currentPage = page; render(); window.scrollTo({ top: 400, behavior: 'smooth' }); }

        function toggleCustomCat() {
            const s = document.getElementById('fCat'), c = document.getElementById('fCatCustom');
            if(s.value === 'Lainnya') { c.style.display = 'block'; c.required = true; }
            else { c.style.display = 'none'; c.required = false; c.value = ''; }
        }

        async function showDetail(id) {
            const res = await fetch(`${API}/${id}`);
            const json = await res.json();
            const d = json.data;
            window.selected = d;
            document.getElementById('pImg').src = d.image ? d.image : '../img/default.png';
            document.getElementById('pTitle').innerText = d.title;
            document.getElementById('pPemenangText').innerText = d.pemenang || "Siswa SIJA";
            document.getElementById('pTingkatBadge').innerText = d.tingkat;
            document.getElementById('pFull').innerText = d.fullDescription || 'Tidak ada deskripsi.';
            if(d.date) {
                const dateObj = new Date(d.date);
                document.getElementById('pDateText').innerText = dateObj.toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
            } else { document.getElementById('pDateText').innerText = '-'; }
            document.getElementById('detailPopup').style.display = 'flex';
        }

        function openForm() {
            document.getElementById('aForm').reset();
            document.getElementById('fId').value = '';
            document.getElementById('imgPreview').style.display = 'none';
            document.getElementById('fCatCustom').style.display = 'none';
            document.getElementById('fHeader').innerText = 'Tambah Prestasi Baru';
            document.getElementById('formPopup').style.display = 'flex';
        }

        function closePopup(id) { document.getElementById(id).style.display = 'none'; }

        function handleEdit() {
            const d = window.selected;
            document.getElementById('fId').value = d._id;
            document.getElementById('fTitle').value = d.title;
            document.getElementById('fPemenang').value = d.pemenang || '';
            document.getElementById('fFull').value = d.fullDescription || '';
            document.getElementById('fTingkat').value = d.tingkat;
            document.getElementById('fDate').value = d.date ? d.date.split('T')[0] : '';
            const preview = document.getElementById('imgPreview');
            if(d.image) { preview.src = d.image; preview.style.display = 'block'; }
            const std = ['Backend', 'Frontend', 'Cyber Security', 'LKS'];
            if(std.includes(d.kategoriLomba)) {
                document.getElementById('fCat').value = d.kategoriLomba;
                document.getElementById('fCatCustom').style.display = 'none';
            } else {
                document.getElementById('fCat').value = 'Lainnya';
                document.getElementById('fCatCustom').value = d.kategoriLomba;
                document.getElementById('fCatCustom').style.display = 'block';
            }
            document.getElementById('fHeader').innerText = 'Edit Data Prestasi';
            closePopup('detailPopup');
            document.getElementById('formPopup').style.display = 'flex';
        }

        async function handleDelete() {
            if(confirm('Yakin ingin menghapus data ini?')) {
                try {
                    const res = await fetch(`${API}/${window.selected._id}`, { 
                        method: 'DELETE',
                        headers: getAuthHeaders()
                    });
                    if (res.ok) {
                        await loadAchievements(); closePopup('detailPopup');
                        showToast("Data berhasil dihapus!", "success");
                    } else { showToast("Gagal menghapus data.", "error"); }
                } catch (err) { showToast("Terjadi kesalahan sistem.", "error"); }
            }
        }

        document.getElementById('aForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const originalText = btn.innerText;
            btn.innerText = "⏳ Menyimpan...";
            btn.disabled = true;

            const fd = new FormData();
            const catVal = document.getElementById('fCat').value;
            const finalCat = catVal === 'Lainnya' ? document.getElementById('fCatCustom').value : catVal;

            fd.append('title', document.getElementById('fTitle').value);
            fd.append('pemenang', document.getElementById('fPemenang').value);
            fd.append('fullDescription', document.getElementById('fFull').value);
            fd.append('tingkat', document.getElementById('fTingkat').value);
            fd.append('kategoriLomba', finalCat);
            fd.append('date', document.getElementById('fDate').value);
            if(document.getElementById('fImg').files[0]) fd.append('image', document.getElementById('fImg').files[0]);

            const id = document.getElementById('fId').value;
            try {
                const res = await fetch(id ? `${API}/${id}` : API, { 
                    method: id ? 'PUT' : 'POST', headers: getAuthHeaders(), body: fd 
                });
                if (res.ok) {
                    closePopup('formPopup'); 
                    await loadAchievements();
                    showToast(id ? "Berhasil diperbarui!" : "Berhasil ditambahkan!");
                } else { showToast("Gagal menyimpan data.", "error"); }
            } catch (err) { showToast("Kesalahan koneksi.", "error"); }
            finally { btn.innerText = originalText; btn.disabled = false; }
        };

        window.onclick = (e) => { if (e.target.classList.contains('popup')) e.target.style.display = "none"; }
        initializeApp();
    </script>
</body>
</html>
